backend:
  name: git-gateway
  branch: main # Make sure this matches your GitHub branch name (usually main)

# This is where images and PDFs will be saved
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "updates"
    label: "News & Meetings"
    folder: "content/updates"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Upload Image or PDF", name: "document", widget: "file", required: false}
      - {label: "Content/Details", name: "body", widget: "markdown"}
